name: GPSD
description: Run gpsd in a container to expose GPS data over TCP
version: 0.2.0
slug: gpsd
url: https://github.com/leo-stan/ha-addon-gpsd
homeassistant: "2025.1.0"

arch:
  - aarch64
  - armv7
  - armhf
  - amd64

startup: services
boot: auto
init: false

host_network: false

ports:
  2947/tcp: 2947
ports_description:
  2947/tcp: "gpsd TCP port"

uart: true
udev: true

options:
  device: null
  baud: 9600
  gpsd_options: "-n -D 2"

schema:
  device: "device(subsystem=tty)"
  baud: int
  gpsd_options: str
